name: Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build backend
        run: ./mvnw -B verify

      - name: Frontend (if present)
        if: ${{ hashFiles('**/frontend/package.json') != '' }}
        run: |
          cd frontend
          corepack enable || true
          npm ci
          npm run build --if-present
          npm test --if-present

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (JVM)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: myapp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker build (native) [optional]
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-native
          push: false
          tags: myapp-native:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true
