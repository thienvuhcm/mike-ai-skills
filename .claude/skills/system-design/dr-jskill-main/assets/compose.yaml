# Docker Compose file for Spring Boot development
# Place this file in your project root for automatic PostgreSQL startup
# with spring-boot-docker-compose

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "user"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
