services:
  # Spring Boot Application
  spring-app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_BOOT_PORT: ${SPRING_BOOT_PORT:-8080}
    ports:
      - "${SPRING_BOOT_PORT:-8080}:${SPRING_BOOT_PORT:-8080}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$${SPRING_BOOT_PORT:-8080}/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 768m
    restart: unless-stopped
